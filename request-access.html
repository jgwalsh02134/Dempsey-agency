<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Request Access — Dempsey Agency</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#10233F" />
    <link rel="stylesheet" href="https://use.typekit.net/urn3pan.css" />
    <style>
      :root {
        color-scheme: light;
        --color-midnight: #10233f;
        --color-fir: #0f524a;
        --color-ocean: #4b6b8a;
        --color-ledger: #e2e8f0;
        --color-canvas: #f8fafc;
        --color-gold: #b18a53;
        --bg: var(--color-canvas);
        --text: var(--color-midnight);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
        font-family: "skolar-latin", serif;
        display: flex;
        flex-direction: column;
      }

      a {
        color: inherit;
      }

      .site-header {
        border-bottom: 1px solid var(--color-ledger);
        background: rgba(248, 250, 252, 0.96);
        flex-shrink: 0;
      }
      .header-inner {
        width: 100%;
        max-width: 56rem;
        margin-inline: auto;
        padding-inline: clamp(1.25rem, 4vw, 2.25rem);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        min-height: 4.75rem;
      }
      .header-logo {
        display: inline-flex;
        align-items: center;
        line-height: 0;
        flex-shrink: 0;
      }
      .header-logo img {
        width: auto;
        height: 2.5rem;
        object-fit: contain;
      }
      .header-back {
        font-family: "neue-haas-grotesk-display", sans-serif;
        font-size: 0.875rem;
        font-weight: 500;
        letter-spacing: 0.02em;
        color: var(--color-ocean);
        text-decoration: none;
        transition: color 0.2s ease;
      }
      .header-back:hover,
      .header-back:focus-visible {
        color: var(--color-midnight);
      }

      .page {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(2rem, 6vw, 4rem) clamp(1.25rem, 4vw, 2.25rem);
      }
      .module {
        width: 100%;
        max-width: 26rem;
      }

      .heading {
        margin: 0;
        font-family: "neue-haas-grotesk-display", sans-serif;
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--color-midnight);
      }
      .subheading {
        margin: 0.375rem 0 0;
        font-size: 0.875rem;
        line-height: 1.5;
        color: var(--color-ocean);
      }

      .form {
        margin-top: 1.75rem;
        display: flex;
        flex-direction: column;
        gap: 1.125rem;
      }
      .form-field {
        display: flex;
        flex-direction: column;
        gap: 0.3125rem;
      }
      .form-field label {
        font-family: "neue-haas-grotesk-display", sans-serif;
        font-size: 0.8125rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--color-midnight);
      }
      .form-field input,
      .form-field textarea {
        width: 100%;
        padding: 0 0.875rem;
        border: 1px solid var(--color-ledger);
        border-radius: 0.5rem;
        background: #ffffff;
        font-family: "skolar-latin", serif;
        font-size: 0.9375rem;
        color: var(--color-midnight);
        transition: border-color 0.2s ease;
      }
      .form-field input {
        height: 2.875rem;
      }
      .form-field textarea {
        padding-top: 0.75rem;
        padding-bottom: 0.75rem;
        min-height: 5rem;
        resize: vertical;
      }
      .form-field input::placeholder,
      .form-field textarea::placeholder {
        color: var(--color-ocean);
        opacity: 0.5;
      }
      .form-field input:focus,
      .form-field textarea:focus {
        outline: none;
        border-color: var(--color-ocean);
      }
      .form-field input:focus-visible,
      .form-field textarea:focus-visible {
        outline: 2px solid var(--color-gold);
        outline-offset: 2px;
        border-color: var(--color-ocean);
      }

      .form-error,
      .form-success {
        margin: 0;
        padding: 0.625rem 0.75rem;
        border-radius: 0.5rem;
        font-size: 0.8125rem;
        line-height: 1.5;
      }
      .form-error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #991b1b;
      }
      .form-success {
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        color: #166534;
      }

      .submit-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 2.875rem;
        padding: 0.75rem 1rem;
        margin-top: 0.25rem;
        border: 1px solid var(--color-midnight);
        border-radius: 999px;
        background: var(--color-midnight);
        color: var(--color-canvas);
        font-family: "neue-haas-grotesk-display", sans-serif;
        font-size: 0.9375rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: background-color 0.2s ease, border-color 0.2s ease;
      }
      .submit-btn:hover {
        background: var(--color-fir);
        border-color: var(--color-fir);
      }
      .submit-btn:focus-visible {
        outline: 2px solid var(--color-gold);
        outline-offset: 2px;
        background: var(--color-fir);
        border-color: var(--color-fir);
      }
      .submit-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .footer {
        margin-top: 1.75rem;
        text-align: center;
        font-size: 0.8125rem;
        color: var(--color-ocean);
      }
      .footer a {
        color: var(--color-ocean);
        text-decoration: none;
        transition: color 0.2s ease;
      }
      .footer a:hover {
        color: var(--color-midnight);
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="header-logo" href="/">
          <img
            src="assets/branding/hor-lockup-2.svg"
            alt="Dempsey Agency"
            decoding="async"
          />
        </a>
        <a class="header-back" href="/login.html">Sign in</a>
      </div>
    </header>

    <main class="page">
      <div class="module">
        <h1 class="heading">Request Access</h1>
        <p class="subheading">
          Submit your information and a Dempsey Agency representative will
          follow up to set up your account.
        </p>

        <form id="request-form" class="form" method="post">
          <div class="form-field">
            <label for="name">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              autocomplete="name"
              placeholder="Your full name"
              required
            />
          </div>

          <div class="form-field">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              autocomplete="email"
              placeholder="you@company.com"
              required
            />
          </div>

          <div class="form-field">
            <label for="company">Company</label>
            <input
              type="text"
              id="company"
              name="company"
              autocomplete="organization"
              placeholder="Your company name"
              required
            />
          </div>

          <div class="form-field">
            <label for="message">Message (optional)</label>
            <textarea
              id="message"
              name="message"
              placeholder="Anything we should know about your request"
              maxlength="2000"
            ></textarea>
          </div>

          <p id="form-error" class="form-error" role="alert" hidden></p>
          <p id="form-success" class="form-success" role="status" hidden></p>

          <button type="submit" class="submit-btn">Submit request</button>
        </form>

        <p class="footer">
          <a href="/login.html">Already have an account? Sign in</a>
        </p>
      </div>
    </main>

    <script>
      (function () {
        var API_BASE_URL = "https://api.dempsey.agency";
        var REQUEST_URL = API_BASE_URL + "/api/v1/account-requests";

        var form = document.getElementById("request-form");
        var nameInput = document.getElementById("name");
        var emailInput = document.getElementById("email");
        var companyInput = document.getElementById("company");
        var messageInput = document.getElementById("message");
        var submitBtn = form.querySelector(".submit-btn");
        var errorEl = document.getElementById("form-error");
        var successEl = document.getElementById("form-success");

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          errorEl.hidden = true;
          successEl.hidden = true;
          submitBtn.disabled = true;
          submitBtn.textContent = "Submitting\u2026";

          var body = {
            name: nameInput.value.trim(),
            email: emailInput.value.trim(),
            company: companyInput.value.trim(),
          };
          var msg = messageInput.value.trim();
          if (msg) body.message = msg;

          fetch(REQUEST_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          })
            .then(function (res) {
              return res.json().then(function (data) {
                return { ok: res.ok, status: res.status, data: data };
              });
            })
            .then(function (result) {
              if (!result.ok) {
                throw new Error(
                  result.data.error || "Something went wrong. Please try again."
                );
              }
              successEl.textContent =
                "Your request has been submitted. A Dempsey Agency representative will be in touch.";
              successEl.hidden = false;
              submitBtn.textContent = "Submitted";
              form.reset();
            })
            .catch(function (err) {
              var msg =
                err instanceof TypeError
                  ? "Unable to connect. Please check your connection and try again."
                  : err.message || "Something went wrong. Please try again.";
              errorEl.textContent = msg;
              errorEl.hidden = false;
              submitBtn.disabled = false;
              submitBtn.textContent = "Submit request";
            });
        });
      })();
    </script>
  </body>
</html>
