<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dempsey Agency</title>
    <link rel="icon" href="assets/favicons/D_FAV_2.svg" type="image/svg+xml" sizes="any" />
    <link rel="stylesheet" href="https://use.typekit.net/urn3pan.css" />
    <style>
      :root {
        color-scheme: light;
        --color-midnight: #10233f;
        --color-fir: #0f524a;
        --color-ocean: #4b6b8a;
        --color-ledger: #e2e8f0;
        --color-canvas: #f8fafc;
        --color-gold: #b18a53;
        --bg: var(--color-canvas);
        --text: var(--color-midnight);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
      }
      .page {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      .hero-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(2rem, 8vw, 4rem) clamp(1.5rem, 6vw, 2.5rem);
      }
      .hero {
        width: 100%;
        max-width: 36rem;
        text-align: center;
      }
      .logo {
        display: block;
        width: clamp(7.5rem, 22vw, 11rem);
        height: auto;
        margin: 0 auto clamp(2rem, 6vw, 3rem);
      }
      .title {
        margin: 0;
        font-family: "neue-haas-grotesk-display", sans-serif;
        font-weight: 700;
        font-size: clamp(1.75rem, 5.5vw, 2.75rem);
        letter-spacing: 0.02em;
        line-height: 1.15;
        color: var(--color-midnight);
      }
      .tagline {
        margin: clamp(1rem, 3vw, 1.5rem) 0 0;
        font-family: "skolar-latin", serif;
        font-weight: 300;
        font-size: clamp(0.8125rem, 2.2vw, 1rem);
        letter-spacing: 0.36em;
        text-transform: uppercase;
        color: var(--color-ocean);
      }
      .site-footer {
        width: 100%;
        box-sizing: border-box;
        border-top: 1px solid var(--color-ledger);
        background: var(--color-canvas);
        padding: clamp(1.5rem, 3.2vw, 1.9rem)
          clamp(1.25rem, 4vw, 2.5rem)
          calc(1.6rem + env(safe-area-inset-bottom, 0px));
        margin-top: auto;
      }
      .footer-inner {
        box-sizing: border-box;
        width: 100%;
        max-width: 72rem;
        margin-inline: auto;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: clamp(1.15rem, 2.5vw, 1.65rem);
      }
      .footer-zone {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        text-align: left;
      }
      .footer-zone--brand {
        padding-bottom: 0;
      }
      .footer-brand-mark {
        display: inline-flex;
        line-height: 0;
        max-width: 100%;
        border-radius: 4px;
        transition: opacity 0.2s ease;
      }
      .footer-brand-mark:hover {
        opacity: 0.88;
      }
      .footer-brand-mark:focus-visible {
        outline: 1px solid var(--color-gold);
        outline-offset: 3px;
      }
      .footer-brand-mark img {
        display: block;
        width: min(16.5rem, 100%);
        height: auto;
        object-fit: contain;
      }
      .footer-zone--affiliates {
        gap: 0.5rem;
        border-top: 1px solid rgba(75, 107, 138, 0.12);
        padding-top: clamp(0.85rem, 2vw, 1.1rem);
      }
      .footer-affil-label {
        margin: 0;
        font-family: "neue-haas-grotesk-display", sans-serif;
        font-size: clamp(0.5625rem, 1.2vw, 0.625rem);
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--color-ocean);
        opacity: 0.72;
        text-align: left;
      }
      .affiliate-marks {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: flex-start;
        align-items: flex-end;
        gap: clamp(1.75rem, 5vw, 3.5rem);
        width: 100%;
        margin: 0;
        padding: 0;
      }
      .affiliate-item {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-end;
        gap: 0.45rem;
        flex: 0 0 auto;
        min-height: 3.1rem;
        padding: 0.25rem 0;
        padding-inline-end: 0.5rem;
        text-decoration: none;
        color: inherit;
        border-radius: 6px;
        transition: opacity 0.2s ease;
      }
      .affiliate-item:hover {
        opacity: 0.9;
      }
      .affiliate-item:focus-visible {
        outline: 1px solid var(--color-gold);
        outline-offset: 2px;
      }
      .affiliate-item img {
        display: block;
        height: clamp(1.35rem, 3.2vw, 1.85rem);
        width: auto;
        max-width: min(10rem, 46vw);
        object-fit: contain;
        object-position: left bottom;
        opacity: 0.58;
        transition: opacity 0.2s ease;
      }
      .affiliate-item:hover img {
        opacity: 0.75;
      }
      .affiliate-name {
        font-family: "skolar-latin", serif;
        font-size: clamp(0.65625rem, 1.4vw, 0.71875rem);
        font-weight: 400;
        line-height: 1.35;
        letter-spacing: 0.03em;
        color: var(--color-ocean);
        opacity: 0.88;
        text-align: left;
      }
      .footer-zone--legal {
        gap: 0.45rem;
        padding-top: clamp(0.75rem, 1.8vw, 1rem);
        border-top: 1px solid rgba(75, 107, 138, 0.12);
      }
      .footer-legal {
        margin: 0;
        font-family: "skolar-latin", serif;
        font-size: clamp(0.6875rem, 1.35vw, 0.75rem);
        font-weight: 400;
        line-height: 1.55;
        color: var(--color-ocean);
        opacity: 0.82;
        letter-spacing: 0.015em;
        text-align: left;
        max-width: 42rem;
      }
      .footer-nav {
        margin: 0;
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-start;
        align-items: center;
        row-gap: 0.35rem;
        column-gap: 0.2rem;
        font-family: "skolar-latin", serif;
        font-size: clamp(0.65625rem, 1.25vw, 0.71875rem);
      }
      .footer-nav a {
        color: var(--color-ocean);
        text-decoration: none;
        letter-spacing: 0.02em;
        padding: 0.3rem 0.5rem 0.3rem 0;
        margin-right: 0.15rem;
        border-radius: 4px;
        transition: color 0.2s ease;
      }
      .footer-nav a:hover {
        color: var(--color-fir);
      }
      .footer-nav a:focus-visible {
        outline: 1px solid var(--color-gold);
        outline-offset: 2px;
      }
      .footer-nav-sep {
        color: var(--color-ledger);
        user-select: none;
        padding: 0 0.2rem 0 0;
        align-self: center;
      }
      .footer-note {
        margin: 0.15rem 0 0;
        font-family: "skolar-latin", serif;
        font-size: clamp(0.59375rem, 1.15vw, 0.65625rem);
        font-weight: 300;
        line-height: 1.55;
        color: var(--color-ocean);
        opacity: 0.76;
        letter-spacing: 0.02em;
        text-align: left;
        max-width: 42rem;
      }
      @media (min-width: 640px) {
        .site-footer {
          padding-top: clamp(1.6rem, 2.2vw, 1.95rem);
          padding-bottom: calc(1.75rem + env(safe-area-inset-bottom, 0px));
        }
        .footer-inner {
          gap: clamp(1.2rem, 2.2vw, 1.55rem);
        }
        .footer-brand-mark img {
          width: min(17.5rem, 100%);
        }
        .affiliate-marks {
          gap: clamp(2.25rem, 6vw, 4.25rem);
        }
        .affiliate-item img {
          max-width: 11rem;
        }
        .footer-nav a {
          padding: 0.35rem 0.65rem 0.35rem 0;
        }
      }
      @media (min-width: 900px) {
        .site-footer {
          padding-inline: clamp(2rem, 5vw, 3rem);
        }
        .footer-brand-mark img {
          width: min(18.5rem, 100%);
        }
        .affiliate-marks {
          gap: 3rem;
        }
        .affiliate-item {
          min-height: 3.35rem;
        }
        .affiliate-item img {
          height: clamp(1.5rem, 2.2vw, 1.95rem);
          max-width: 12rem;
        }
        .footer-zone--legal {
          gap: 0.5rem;
        }
        .footer-nav {
          column-gap: 0.35rem;
        }
      }
      @media (min-width: 1200px) {
        .footer-inner {
          max-width: 75rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main class="hero-wrap">
        <div class="hero">
          <img
            class="logo"
            src="assets/favicons/D_FAV_2.svg"
            alt=""
            width="176"
            height="176"
            decoding="async"
          />
          <h1 class="title">Dempsey Agency</h1>
          <p class="tagline">Coming Soon</p>
        </div>
      </main>
      <footer class="site-footer">
        <div class="footer-inner">
          <div class="footer-zone footer-zone--brand">
            <a
              class="footer-brand-mark"
              href="https://dempsey.agency/"
              aria-label="Dempsey Agency"
            >
              <img
                src="assets/branding/word_letter_mark.svg"
                alt=""
                width="240"
                height="71"
                decoding="async"
              />
            </a>
          </div>

          <div class="footer-zone footer-zone--affiliates">
            <p class="footer-affil-label">Affiliated companies</p>
            <div class="affiliate-marks">
              <a
                class="affiliate-item"
                href="https://www.vdata.com/"
                target="_blank"
                rel="noopener noreferrer"
              >
                <img
                  src="assets/branding/vdata-logo-v.svg"
                  alt=""
                  width="40"
                  height="40"
                  decoding="async"
                />
                <span class="affiliate-name">Vision Data</span>
              </a>
              <a
                class="affiliate-item"
                href="https://adsell.ai/"
                target="_blank"
                rel="noopener noreferrer"
              >
                <img
                  src="assets/branding/as-short-wordmark.svg"
                  alt=""
                  width="96"
                  height="28"
                  decoding="async"
                />
                <span class="affiliate-name">AdSell.ai</span>
              </a>
            </div>
          </div>

          <div class="footer-zone footer-zone--legal">
            <p class="footer-legal">
              © 2026 Dempsey Agency, LLC. All rights reserved.
            </p>
            <nav class="footer-nav" aria-label="Legal and contact">
              <a href="/privacy">Privacy Policy</a>
              <span class="footer-nav-sep" aria-hidden="true">·</span>
              <a href="/terms">Terms of Use</a>
              <span class="footer-nav-sep" aria-hidden="true">·</span>
              <a href="/contact">Contact</a>
            </nav>
            <p class="footer-note">
              Dempsey Agency, LLC is an independent business entity.
            </p>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
