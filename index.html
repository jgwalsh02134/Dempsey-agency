<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dempsey Agency</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f6fb;
        color: #111827;
      }
      .page {
        width: min(96vw, 960px);
        padding: 2rem;
        text-align: center;
      }
      .brand {
        margin-bottom: 1rem;
        font-size: clamp(2rem, 4vw, 3.5rem);
        line-height: 1.05;
      }
      .support {
        margin: 0 auto 2rem;
        max-width: 40rem;
        color: #475569;
        font-size: 1.05rem;
      }
      .hero-image {
        width: 100%;
        height: auto;
        max-height: 620px;
        object-fit: cover;
        border-radius: 1.25rem;
        box-shadow: 0 28px 80px rgba(15, 23, 42, 0.12);
        margin-top: 2rem;
      }
      .links {
        margin-top: 2rem;
        display: inline-flex;
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .links a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.9rem 1.4rem;
        border-radius: 999px;
        background: #1d4ed8;
        color: white;
        text-decoration: none;
        font-weight: 600;
        transition: transform 0.2s ease, background 0.2s ease;
      }
      .links a:hover {
        background: #1e40af;
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1 class="brand">Dempsey Agency</h1>
      <p class="support">We’re launching soon. In the meantime, check out our partner sites below.</p>
      <img class="hero-image" src="assets/images/home-image.png" alt="Coming soon" />
      <div class="links">
        <a href="https://vdata.com" target="_blank" rel="noopener noreferrer">vdata.com</a>
        <a href="https://adsell.ai" target="_blank" rel="noopener noreferrer">adsell.ai</a>
      </div>
    </main>
  </body>
</html>
