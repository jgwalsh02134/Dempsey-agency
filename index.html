<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dempsey Agency</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="stylesheet" href="https://use.typekit.net/urn3pan.css" />
    <style>
      :root {
        color-scheme: light;
        --color-midnight: #10233f;
        --color-fir: #0f524a;
        --color-ocean: #4b6b8a;
        --color-ledger: #e2e8f0;
        --color-canvas: #f8fafc;
        --color-gold: #b18a53;
        --bg: var(--color-canvas);
        --text: var(--color-midnight);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
      }
      .page {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      .hero-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(2rem, 8vw, 4rem) clamp(1.5rem, 6vw, 2.5rem);
      }
      .hero {
        width: 100%;
        max-width: 36rem;
        text-align: center;
      }
      .logo {
        display: block;
        width: clamp(14.5rem, 48vw, 19.25rem);
        max-width: min(92vw, 20rem);
        height: auto;
        margin: 0 auto clamp(2rem, 5.5vw, 2.75rem);
        object-fit: contain;
        object-position: center center;
      }
      .tagline {
        margin: 0;
        font-family: "skolar-latin", serif;
        font-weight: 300;
        font-size: clamp(0.8125rem, 2.2vw, 1rem);
        letter-spacing: 0.36em;
        text-transform: uppercase;
        color: var(--color-ocean);
      }
      /* ── Footer ── */
      .site-footer {
        width: 100%;
        border-top: 1px solid var(--color-ledger);
        background: var(--color-canvas);
        padding: clamp(2rem, 4.5vw, 2.75rem) clamp(1.25rem, 4vw, 2.25rem)
          calc(1.5rem + env(safe-area-inset-bottom, 0px));
        margin-top: auto;
      }
      .footer-shell {
        width: 100%;
        max-width: 54rem;
        margin-inline: auto;
      }

      /* ── Upper: brand + contact | affiliates ── */
      .footer-upper {
        display: flex;
        flex-direction: column;
        gap: clamp(1.75rem, 3.2vw, 2.25rem);
        padding-bottom: clamp(1.35rem, 2.6vw, 1.75rem);
        border-bottom: 1px solid var(--color-ledger);
      }
      .footer-brand-col {
        display: flex;
        flex-direction: column;
        gap: clamp(0.85rem, 1.6vw, 1.1rem);
      }
      .footer-logo {
        display: inline-flex;
        line-height: 0;
        border-radius: 4px;
        transition: opacity 0.2s ease;
        align-self: flex-start;
      }
      .footer-logo:hover {
        opacity: 0.82;
      }
      .footer-logo:focus-visible {
        outline: 2px solid var(--color-gold);
        outline-offset: 4px;
      }
      .footer-logo img {
        display: block;
        height: clamp(1.5rem, 3.4vw, 1.85rem);
        width: auto;
        max-width: min(12rem, 72vw);
        object-fit: contain;
      }
      .footer-address {
        margin: 0;
        padding: 0;
        font-style: normal;
        display: flex;
        flex-direction: column;
        gap: 0.05rem;
        font-family: "skolar-latin", serif;
        font-size: clamp(0.8125rem, 1.3vw, 0.875rem);
        font-weight: 400;
        line-height: 1.55;
        letter-spacing: 0.01em;
        color: var(--color-ocean);
      }
      .footer-address p {
        margin: 0;
      }
      .footer-address a {
        color: var(--color-midnight);
        text-decoration: none;
        font-weight: 500;
        border-radius: 3px;
        transition: color 0.2s ease;
      }
      .footer-address a:hover {
        color: var(--color-fir);
      }
      .footer-address a:focus-visible {
        outline: 2px solid var(--color-gold);
        outline-offset: 2px;
      }

      /* ── Affiliates ── */
      .footer-affiliates-col {
        display: flex;
        flex-direction: column;
        gap: clamp(0.5rem, 1vw, 0.65rem);
      }
      .footer-label {
        margin: 0;
        font-family: "neue-haas-grotesk-display", sans-serif;
        font-size: clamp(0.625rem, 1.1vw, 0.6875rem);
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--color-ocean);
        opacity: 0.7;
      }
      .footer-affiliates {
        display: flex;
        align-items: center;
        gap: clamp(1.25rem, 2.8vw, 1.75rem);
      }
      .footer-affiliate {
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        border-radius: 4px;
        transition: opacity 0.2s ease;
        opacity: 0.62;
      }
      .footer-affiliate:hover {
        opacity: 0.88;
      }
      .footer-affiliate:focus-visible {
        outline: 2px solid var(--color-gold);
        outline-offset: 4px;
        opacity: 0.88;
      }
      .footer-affiliate img {
        display: block;
        width: auto;
        height: auto;
        object-fit: contain;
      }
      .footer-affiliate--vision img {
        height: clamp(0.5rem, 1.1vw, 0.625rem);
      }
      .footer-affiliate--adsell img {
        height: clamp(0.875rem, 1.6vw, 1.0625rem);
      }

      /* ── Lower: nav + legal ── */
      .footer-lower {
        padding-top: clamp(1rem, 2vw, 1.35rem);
        display: flex;
        flex-direction: column;
        gap: clamp(0.55rem, 1.2vw, 0.75rem);
      }
      .footer-nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0;
        font-family: "skolar-latin", serif;
        font-size: clamp(0.78125rem, 1.2vw, 0.84375rem);
      }
      .footer-nav a {
        color: var(--color-ocean);
        text-decoration: none;
        letter-spacing: 0.012em;
        padding: 0.25rem 0;
        border-radius: 3px;
        transition: color 0.2s ease;
      }
      .footer-nav a:hover {
        color: var(--color-midnight);
      }
      .footer-nav a:focus-visible {
        outline: 2px solid var(--color-gold);
        outline-offset: 2px;
      }
      .footer-nav-sep {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--color-ocean);
        opacity: 0.35;
        margin: 0 clamp(0.5rem, 1.1vw, 0.75rem);
        flex-shrink: 0;
      }
      .footer-legal-block {
        display: flex;
        flex-direction: column;
        gap: 0.15rem;
      }
      .footer-copyright {
        margin: 0;
        font-family: "skolar-latin", serif;
        font-size: clamp(0.6875rem, 1.05vw, 0.75rem);
        line-height: 1.4;
        color: var(--color-ocean);
        opacity: 0.58;
        letter-spacing: 0.008em;
      }
      .footer-disclaimer {
        margin: 0;
        font-family: "skolar-latin", serif;
        font-size: clamp(0.625rem, 0.95vw, 0.6875rem);
        font-weight: 300;
        line-height: 1.4;
        color: var(--color-ocean);
        opacity: 0.44;
      }

      /* ── Tablet ── */
      @media (min-width: 640px) {
        .footer-upper {
          flex-direction: row;
          justify-content: space-between;
          align-items: flex-start;
        }
        .footer-affiliates-col {
          align-items: flex-end;
          text-align: right;
        }
        .footer-affiliates {
          gap: clamp(1.5rem, 3vw, 2rem);
        }
        .footer-lower {
          flex-direction: row;
          justify-content: space-between;
          align-items: baseline;
        }
        .footer-legal-block {
          align-items: flex-end;
          text-align: right;
        }
      }
      /* ── Desktop ── */
      @media (min-width: 900px) {
        .site-footer {
          padding-inline: clamp(2rem, 5vw, 3rem);
        }
        .footer-logo img {
          height: clamp(1.65rem, 2vw, 1.9rem);
        }
        .footer-affiliate--vision img {
          height: clamp(0.5625rem, 0.78vw, 0.6875rem);
        }
        .footer-affiliate--adsell img {
          height: clamp(0.9375rem, 1.3vw, 1.125rem);
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main class="hero-wrap">
        <div class="hero">
          <img
            class="logo"
            src="assets/branding/hor-lockup.svg"
            alt="Dempsey Agency logo"
            width="244"
            height="67"
            decoding="async"
          />
          <p class="tagline">Coming Soon</p>
        </div>
      </main>
      <footer class="site-footer">
        <div class="footer-shell">
          <div class="footer-upper">
            <div class="footer-brand-col">
              <a class="footer-logo" href="https://dempsey.agency">
                <img
                  src="assets/branding/hor-lockup.svg"
                  alt="Dempsey Agency"
                  decoding="async"
                />
              </a>
              <address class="footer-address">
                <a href="mailto:info@dempsey.agency">info@dempsey.agency</a>
                <p>1377 Third Street</p>
                <p>Rensselaer, NY 12144</p>
              </address>
            </div>
            <div class="footer-affiliates-col">
              <p class="footer-label">Affiliated companies</p>
              <div class="footer-affiliates">
                <a
                  class="footer-affiliate footer-affiliate--vision"
                  href="https://www.vdata.com/"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <img
                    src="assets/branding/small_v-data-wordimage.svg"
                    alt="Vision Data"
                    decoding="async"
                  />
                </a>
                <a
                  class="footer-affiliate footer-affiliate--adsell"
                  href="https://adsell.ai/"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <img
                    src="assets/branding/blue-as-full-wordmark%20copy.svg"
                    alt="AdSell.ai"
                    decoding="async"
                  />
                </a>
              </div>
            </div>
          </div>
          <div class="footer-lower">
            <nav class="footer-nav" aria-label="Footer navigation">
              <a href="/privacy">Privacy Policy</a>
              <span class="footer-nav-sep" aria-hidden="true"></span>
              <a href="/terms">Terms of Use</a>
              <span class="footer-nav-sep" aria-hidden="true"></span>
              <a href="/contact">Contact</a>
            </nav>
            <div class="footer-legal-block">
              <p class="footer-copyright">
                &copy; 2026 Dempsey Agency, LLC. All rights reserved.
              </p>
              <p class="footer-disclaimer">
                Dempsey Agency, LLC is an independent business entity.
              </p>
            </div>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
