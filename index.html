<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dempsey Agency</title>
    <link rel="icon" href="assets/favicons/D_FAV_2.svg" type="image/svg+xml" sizes="any" />
    <link rel="stylesheet" href="https://use.typekit.net/urn3pan.css" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --text: #10233f;
        --text-muted: #3d4f6b;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
      }
      .hero {
        width: 100%;
        max-width: 36rem;
        padding: clamp(2rem, 8vw, 4rem) clamp(1.5rem, 6vw, 2.5rem);
        text-align: center;
      }
      .logo {
        display: block;
        width: clamp(7.5rem, 22vw, 11rem);
        height: auto;
        margin: 0 auto clamp(2rem, 6vw, 3rem);
      }
      .title {
        margin: 0;
        font-family: "neue-haas-grotesk-display", sans-serif;
        font-weight: 700;
        font-size: clamp(1.75rem, 5.5vw, 2.75rem);
        letter-spacing: 0.02em;
        line-height: 1.15;
      }
      .tagline {
        margin: clamp(1rem, 3vw, 1.5rem) 0 0;
        font-family: "skolar-latin", serif;
        font-weight: 300;
        font-size: clamp(1rem, 2.8vw, 1.25rem);
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <main class="hero">
      <img
        class="logo"
        src="assets/favicons/D_FAV_2.svg"
        alt=""
        width="176"
        height="176"
        decoding="async"
      />
      <h1 class="title">Dempsey Agency</h1>
      <p class="tagline">Coming Soon</p>
    </main>
  </body>
</html>
