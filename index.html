<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dempsey Agency</title>
    <link rel="icon" href="assets/favicons/D_FAV_2.svg" type="image/svg+xml" sizes="any" />
    <link rel="stylesheet" href="https://use.typekit.net/urn3pan.css" />
    <style>
      :root {
        color-scheme: light;
        --color-midnight: #10233f;
        --color-fir: #0f524a;
        --color-ocean: #4b6b8a;
        --color-ledger: #e2e8f0;
        --color-canvas: #f8fafc;
        --color-gold: #b18a53;
        --bg: var(--color-canvas);
        --text: var(--color-midnight);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
      }
      .page {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      .hero-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(2rem, 8vw, 4rem) clamp(1.5rem, 6vw, 2.5rem);
      }
      .hero {
        width: 100%;
        max-width: 36rem;
        text-align: center;
      }
      .logo {
        display: block;
        width: clamp(7.5rem, 22vw, 11rem);
        height: auto;
        margin: 0 auto clamp(2rem, 6vw, 3rem);
      }
      .title {
        margin: 0;
        font-family: "neue-haas-grotesk-display", sans-serif;
        font-weight: 700;
        font-size: clamp(1.75rem, 5.5vw, 2.75rem);
        letter-spacing: 0.02em;
        line-height: 1.15;
        color: var(--color-midnight);
      }
      .tagline {
        margin: clamp(1rem, 3vw, 1.5rem) 0 0;
        font-family: "skolar-latin", serif;
        font-weight: 300;
        font-size: clamp(0.8125rem, 2.2vw, 1rem);
        letter-spacing: 0.36em;
        text-transform: uppercase;
        color: var(--color-ocean);
      }
      .site-footer {
        border-top: 1px solid var(--color-ledger);
        padding: clamp(1.75rem, 5vw, 2.5rem) clamp(1.25rem, 5vw, 2rem)
          calc(2.5rem + env(safe-area-inset-bottom, 0px));
        margin-top: 0;
      }
      .footer-inner {
        max-width: 36rem;
        margin: 0 auto;
        text-align: center;
      }
      .footer-legal {
        margin: 0;
        font-family: "skolar-latin", serif;
        font-size: 0.6875rem;
        font-weight: 400;
        line-height: 1.5;
        color: var(--color-ocean);
        letter-spacing: 0.02em;
      }
      .footer-nav {
        margin: 0.85rem 0 0;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 0.35rem 0.5rem;
        font-family: "skolar-latin", serif;
        font-size: 0.6875rem;
      }
      .footer-nav a {
        color: var(--color-ocean);
        text-decoration: none;
        letter-spacing: 0.04em;
        transition: color 0.2s ease;
      }
      .footer-nav a:hover {
        color: var(--color-fir);
      }
      .footer-nav a:focus-visible {
        outline: 1px solid var(--color-gold);
        outline-offset: 3px;
      }
      .footer-nav-sep {
        color: var(--color-ledger);
        user-select: none;
      }
      .footer-note {
        margin: 1rem 0 0;
        font-family: "skolar-latin", serif;
        font-size: 0.625rem;
        font-weight: 300;
        line-height: 1.55;
        color: var(--color-ocean);
        opacity: 0.88;
        letter-spacing: 0.03em;
      }
      .footer-affil-label {
        margin: 1.75rem 0 0;
        font-family: "neue-haas-grotesk-display", sans-serif;
        font-size: 0.5625rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--color-ocean);
        opacity: 0.75;
      }
      .affiliate-marks {
        margin: 0.85rem 0 0;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: flex-end;
        gap: clamp(1.25rem, 5vw, 2.25rem);
      }
      .affiliate-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
        max-width: min(6.5rem, 30vw);
      }
      .affiliate-item img {
        display: block;
        height: clamp(1rem, 3vw, 1.25rem);
        width: auto;
        max-width: 100%;
        object-fit: contain;
        opacity: 0.5;
        transition: opacity 0.2s ease;
      }
      .affiliate-item img:hover {
        opacity: 0.68;
      }
      .affiliate-name {
        font-family: "skolar-latin", serif;
        font-size: 0.5625rem;
        font-weight: 400;
        line-height: 1.3;
        letter-spacing: 0.06em;
        color: var(--color-ocean);
        opacity: 0.85;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main class="hero-wrap">
        <div class="hero">
          <img
            class="logo"
            src="assets/favicons/D_FAV_2.svg"
            alt=""
            width="176"
            height="176"
            decoding="async"
          />
          <h1 class="title">Dempsey Agency</h1>
          <p class="tagline">Coming Soon</p>
        </div>
      </main>
      <footer class="site-footer">
        <div class="footer-inner">
          <p class="footer-legal">
            © 2026 Dempsey Agency, LLC. All rights reserved.
          </p>
          <nav class="footer-nav" aria-label="Legal and contact">
            <a href="/privacy">Privacy Policy</a>
            <span class="footer-nav-sep" aria-hidden="true">·</span>
            <a href="/terms">Terms of Use</a>
            <span class="footer-nav-sep" aria-hidden="true">·</span>
            <a href="/contact">Contact</a>
          </nav>
          <p class="footer-note">
            Dempsey Agency, LLC is an independent business entity.
          </p>
          <p class="footer-affil-label">Affiliated companies</p>
          <div class="affiliate-marks">
            <div class="affiliate-item">
              <img
                src="assets/branding/D-FAV.svg"
                alt=""
                width="48"
                height="48"
                decoding="async"
              />
              <span class="affiliate-name">Dempsey Agency</span>
            </div>
            <div class="affiliate-item">
              <img
                src="assets/branding/as-short-wordmark.svg"
                alt=""
                width="80"
                height="24"
                decoding="async"
              />
              <span class="affiliate-name">adsell.ai</span>
            </div>
            <div class="affiliate-item">
              <img
                src="assets/branding/vdata-logo-v.svg"
                alt=""
                width="32"
                height="32"
                decoding="async"
              />
              <span class="affiliate-name">Vision Data</span>
            </div>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
