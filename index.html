<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dempsey Agency</title>
    <link rel="icon" href="assets/favicons/D_FAV_2.svg" type="image/svg+xml" sizes="any" />
    <link rel="stylesheet" href="https://use.typekit.net/urn3pan.css" />
    <style>
      :root {
        color-scheme: light;
        --color-midnight: #10233f;
        --color-fir: #0f524a;
        --color-ocean: #4b6b8a;
        --color-ledger: #e2e8f0;
        --color-canvas: #f8fafc;
        --color-gold: #b18a53;
        --bg: var(--color-canvas);
        --text: var(--color-midnight);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
      }
      .page {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      .hero-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(2rem, 8vw, 4rem) clamp(1.5rem, 6vw, 2.5rem);
      }
      .hero {
        width: 100%;
        max-width: 36rem;
        text-align: center;
      }
      .logo {
        display: block;
        width: clamp(7.5rem, 22vw, 11rem);
        height: auto;
        margin: 0 auto clamp(2rem, 6vw, 3rem);
      }
      .title {
        margin: 0;
        font-family: "neue-haas-grotesk-display", sans-serif;
        font-weight: 700;
        font-size: clamp(1.75rem, 5.5vw, 2.75rem);
        letter-spacing: 0.02em;
        line-height: 1.15;
        color: var(--color-midnight);
      }
      .tagline {
        margin: clamp(1rem, 3vw, 1.5rem) 0 0;
        font-family: "skolar-latin", serif;
        font-weight: 300;
        font-size: clamp(0.8125rem, 2.2vw, 1rem);
        letter-spacing: 0.36em;
        text-transform: uppercase;
        color: var(--color-ocean);
      }
      .site-footer {
        --footer-rhythm: clamp(0.7rem, 1.6vw, 0.95rem);
        --footer-zone-gap: clamp(1rem, 2.2vw, 1.35rem);
        width: 100%;
        box-sizing: border-box;
        border-top: 1px solid var(--color-ledger);
        background: var(--color-canvas);
        padding: clamp(1.35rem, 2.8vw, 1.65rem)
          clamp(1.15rem, 4vw, 2rem)
          calc(1.45rem + env(safe-area-inset-bottom, 0px));
        margin-top: auto;
      }
      .footer-inner {
        box-sizing: border-box;
        width: 100%;
        max-width: min(52rem, 100%);
        margin-inline: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--footer-zone-gap);
      }
      .footer-zone {
        width: 100%;
        max-width: 36rem;
        margin-inline: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .footer-zone--brand {
        margin-bottom: 0;
      }
      .footer-brand-mark {
        display: inline-flex;
        line-height: 0;
        border-radius: 4px;
        transition: opacity 0.2s ease;
      }
      .footer-brand-mark:hover {
        opacity: 0.88;
      }
      .footer-brand-mark:focus-visible {
        outline: 2px solid var(--color-gold);
        outline-offset: 4px;
      }
      .footer-brand-mark img {
        display: block;
        height: clamp(3.5rem, 9vw, 4.15rem);
        width: auto;
        max-width: min(6.75rem, 38vw);
        object-fit: contain;
        object-position: center top;
      }
      .footer-zone--affiliates {
        gap: var(--footer-rhythm);
        padding-top: 2px;
      }
      .footer-affil-label {
        margin: 0;
        width: 100%;
        font-family: "neue-haas-grotesk-display", sans-serif;
        font-size: clamp(0.5625rem, 1.15vw, 0.625rem);
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--color-ocean);
        opacity: 0.68;
        text-align: center;
      }
      .affiliate-marks {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        justify-content: center;
        align-items: end;
        width: 100%;
        max-width: 19.5rem;
        margin: 0 auto;
        padding: 0;
        gap: clamp(1.25rem, 4vw, 2rem);
        column-gap: clamp(1.5rem, 5vw, 2.75rem);
      }
      .affiliate-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        gap: 0.4rem;
        min-height: 2.85rem;
        min-width: 0;
        padding: 0.2rem 0.35rem;
        text-decoration: none;
        color: inherit;
        border-radius: 6px;
        transition: opacity 0.2s ease;
      }
      .affiliate-item:hover {
        opacity: 0.9;
      }
      .affiliate-item:focus-visible {
        outline: 2px solid var(--color-gold);
        outline-offset: 3px;
      }
      .affiliate-item img {
        display: block;
        height: clamp(1.2rem, 2.8vw, 1.55rem);
        width: auto;
        max-width: 100%;
        object-fit: contain;
        object-position: center bottom;
        opacity: 0.55;
        transition: opacity 0.2s ease;
      }
      .affiliate-item:hover img {
        opacity: 0.72;
      }
      .affiliate-name {
        font-family: "skolar-latin", serif;
        font-size: clamp(0.625rem, 1.35vw, 0.6875rem);
        font-weight: 400;
        line-height: 1.3;
        letter-spacing: 0.035em;
        color: var(--color-ocean);
        opacity: 0.82;
        text-align: center;
      }
      .footer-zone--meta {
        gap: var(--footer-rhythm);
        max-width: 38rem;
      }
      .footer-nav {
        margin: 0;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        row-gap: 0.5rem;
        column-gap: 0;
        font-family: "skolar-latin", serif;
        font-size: clamp(0.71875rem, 1.45vw, 0.8125rem);
        font-weight: 400;
      }
      .footer-nav a {
        color: var(--color-midnight);
        text-decoration: none;
        letter-spacing: 0.02em;
        padding: 0.4rem 0.65rem;
        border-radius: 4px;
        transition: color 0.2s ease;
      }
      .footer-nav a:hover {
        color: var(--color-fir);
      }
      .footer-nav a:focus-visible {
        outline: 2px solid var(--color-gold);
        outline-offset: 2px;
      }
      .footer-nav-sep {
        color: var(--color-ocean);
        opacity: 0.35;
        user-select: none;
        padding: 0 0.15rem;
        font-weight: 300;
      }
      .footer-legal-stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.35rem;
        margin-top: 0.15rem;
      }
      .footer-legal {
        margin: 0;
        font-family: "skolar-latin", serif;
        font-size: clamp(0.65625rem, 1.25vw, 0.71875rem);
        font-weight: 400;
        line-height: 1.5;
        color: var(--color-ocean);
        opacity: 0.72;
        letter-spacing: 0.012em;
        text-align: center;
        text-wrap: balance;
        max-width: 34rem;
      }
      .footer-note {
        margin: 0;
        font-family: "skolar-latin", serif;
        font-size: clamp(0.59375rem, 1.1vw, 0.65625rem);
        font-weight: 300;
        line-height: 1.5;
        color: var(--color-ocean);
        opacity: 0.58;
        letter-spacing: 0.018em;
        text-align: center;
        text-wrap: balance;
        max-width: 32rem;
      }
      @media (max-width: 22rem) {
        .affiliate-marks {
          grid-template-columns: 1fr;
          max-width: 12rem;
          row-gap: 1.1rem;
        }
      }
      @media (min-width: 640px) {
        .site-footer {
          padding-top: clamp(1.45rem, 2vw, 1.7rem);
          padding-bottom: calc(1.55rem + env(safe-area-inset-bottom, 0px));
        }
        .footer-inner {
          --footer-zone-gap: clamp(1.05rem, 1.9vw, 1.25rem);
        }
        .footer-brand-mark img {
          height: clamp(3.65rem, 6.5vw, 4.35rem);
          max-width: min(7rem, 32vw);
        }
        .affiliate-marks {
          max-width: 21rem;
        }
      }
      @media (min-width: 900px) {
        .site-footer {
          padding-inline: clamp(1.75rem, 4vw, 2.75rem);
        }
        .footer-inner {
          max-width: min(56rem, 100%);
        }
        .footer-zone {
          max-width: 40rem;
        }
        .footer-nav a {
          padding: 0.42rem 0.75rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main class="hero-wrap">
        <div class="hero">
          <img
            class="logo"
            src="assets/favicons/D_FAV_2.svg"
            alt=""
            width="176"
            height="176"
            decoding="async"
          />
          <h1 class="title">Dempsey Agency</h1>
          <p class="tagline">Coming Soon</p>
        </div>
      </main>
      <footer class="site-footer">
        <div class="footer-inner">
          <div class="footer-zone footer-zone--brand">
            <a class="footer-brand-mark" href="https://dempsey.agency">
              <img
                src="assets/branding/D-Vertical.svg"
                alt="Dempsey Agency"
                width="148"
                height="181"
                decoding="async"
              />
            </a>
          </div>

          <div class="footer-zone footer-zone--affiliates">
            <p class="footer-affil-label">Affiliated companies</p>
            <div class="affiliate-marks">
              <a
                class="affiliate-item"
                href="https://www.vdata.com/"
                target="_blank"
                rel="noopener noreferrer"
              >
                <img
                  src="assets/branding/vdata-logo-v.svg"
                  alt="Vision Data"
                  width="40"
                  height="40"
                  decoding="async"
                />
                <span class="affiliate-name" aria-hidden="true">Vision Data</span>
              </a>
              <a
                class="affiliate-item"
                href="https://adsell.ai/"
                target="_blank"
                rel="noopener noreferrer"
              >
                <img
                  src="assets/branding/as-short-wordmark.svg"
                  alt="AdSell.ai"
                  width="96"
                  height="28"
                  decoding="async"
                />
                <span class="affiliate-name" aria-hidden="true">AdSell.ai</span>
              </a>
            </div>
          </div>

          <div class="footer-zone footer-zone--meta">
            <nav class="footer-nav" aria-label="Legal and contact">
              <a href="/privacy">Privacy Policy</a>
              <span class="footer-nav-sep" aria-hidden="true">·</span>
              <a href="/terms">Terms of Use</a>
              <span class="footer-nav-sep" aria-hidden="true">·</span>
              <a href="/contact">Contact</a>
            </nav>
            <div class="footer-legal-stack">
              <p class="footer-legal">
                © 2026 Dempsey Agency, LLC. All rights reserved.
              </p>
              <p class="footer-note">
                Dempsey Agency, LLC is an independent business entity.
              </p>
            </div>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
