<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dempsey Agency</title>
    <link rel="icon" href="assets/favicons/D_FAV_2.svg" type="image/svg+xml" sizes="any" />
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f6fb;
        color: #111827;
      }
      .page {
        width: 100%;
        max-width: 100%;
        padding: 1rem;
        text-align: center;
      }
      .hero-headline {
        margin: 0 0 1rem;
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .hero-image {
        width: 100%;
        max-height: calc(100vh - 10rem);
        height: auto;
        object-fit: contain;
        display: block;
        border-radius: 0;
        box-shadow: none;
        margin: 0 auto;
      }
      .links {
        margin-top: 1.25rem;
        display: inline-flex;
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .links a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.9rem 1.4rem;
        border-radius: 999px;
        background: #1d4ed8;
        color: white;
        text-decoration: none;
        font-weight: 600;
        transition: transform 0.2s ease, background 0.2s ease;
      }
      .links a:hover {
        background: #1e40af;
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1 class="hero-headline">Website Coming Soon</h1>
      <img class="hero-image" src="assets/images/beC6a.png" alt="Website coming soon" />
      <div class="links">
        <a href="https://vdata.com" target="_blank" rel="noopener noreferrer">vdata.com</a>
        <a href="https://adsell.ai" target="_blank" rel="noopener noreferrer">adsell.ai</a>
      </div>
    </main>
  </body>
</html>
