<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dempsey Agency</title>
    <link rel="icon" href="assets/favicons/D_FAV_2.svg" type="image/svg+xml" sizes="any" />
    <link rel="stylesheet" href="https://use.typekit.net/urn3pan.css" />
    <style>
      :root {
        color-scheme: light;
        --color-midnight: #10233f;
        --color-fir: #0f524a;
        --color-ocean: #4b6b8a;
        --color-ledger: #e2e8f0;
        --color-canvas: #f8fafc;
        --color-gold: #b18a53;
        --bg: var(--color-canvas);
        --text: var(--color-midnight);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
      }
      .page {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      .hero-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(2rem, 8vw, 4rem) clamp(1.5rem, 6vw, 2.5rem);
      }
      .hero {
        width: 100%;
        max-width: 36rem;
        text-align: center;
      }
      .logo {
        display: block;
        width: clamp(7.5rem, 22vw, 11rem);
        height: auto;
        margin: 0 auto clamp(2rem, 6vw, 3rem);
      }
      .title {
        margin: 0;
        font-family: "neue-haas-grotesk-display", sans-serif;
        font-weight: 700;
        font-size: clamp(1.75rem, 5.5vw, 2.75rem);
        letter-spacing: 0.02em;
        line-height: 1.15;
        color: var(--color-midnight);
      }
      .tagline {
        margin: clamp(1rem, 3vw, 1.5rem) 0 0;
        font-family: "skolar-latin", serif;
        font-weight: 300;
        font-size: clamp(0.8125rem, 2.2vw, 1rem);
        letter-spacing: 0.36em;
        text-transform: uppercase;
        color: var(--color-ocean);
      }
      .site-footer {
        border-top: 1px solid var(--color-ledger);
        padding: clamp(2rem, 5vw, 2.75rem) clamp(1.25rem, 5vw, 2rem)
          calc(2.75rem + env(safe-area-inset-bottom, 0px));
        margin-top: 0;
      }
      .footer-inner {
        max-width: 38rem;
        margin: 0 auto;
        text-align: center;
      }
      .footer-brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        padding-bottom: clamp(1.5rem, 4vw, 2.25rem);
        margin-bottom: clamp(1.25rem, 3.5vw, 1.75rem);
        border-bottom: 1px solid var(--color-ledger);
      }
      .footer-brand-mark {
        display: inline-flex;
        line-height: 0;
        border-radius: 4px;
        transition: opacity 0.2s ease;
      }
      .footer-brand-mark:hover {
        opacity: 0.85;
      }
      .footer-brand-mark:focus-visible {
        outline: 1px solid var(--color-gold);
        outline-offset: 4px;
      }
      .footer-brand-mark img {
        display: block;
        width: clamp(3rem, 10vw, 3.75rem);
        height: auto;
        object-fit: contain;
      }
      .footer-brand-name {
        margin: 0;
        font-family: "neue-haas-grotesk-display", sans-serif;
        font-weight: 700;
        font-size: clamp(1.0625rem, 2.8vw, 1.35rem);
        letter-spacing: 0.04em;
        color: var(--color-midnight);
        line-height: 1.2;
      }
      .footer-legal-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }
      .footer-legal {
        margin: 0;
        font-family: "skolar-latin", serif;
        font-size: clamp(0.75rem, 1.9vw, 0.875rem);
        font-weight: 400;
        line-height: 1.55;
        color: var(--color-midnight);
        letter-spacing: 0.02em;
        max-width: 26rem;
      }
      .footer-nav {
        margin: 1rem 0 0;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        row-gap: 0.65rem;
        column-gap: 0.35rem;
        font-family: "skolar-latin", serif;
        font-size: clamp(0.75rem, 1.85vw, 0.8125rem);
      }
      .footer-nav a {
        color: var(--color-ocean);
        text-decoration: none;
        letter-spacing: 0.03em;
        padding: 0.4rem 0.55rem;
        border-radius: 4px;
        transition: color 0.2s ease;
      }
      .footer-nav a:hover {
        color: var(--color-fir);
      }
      .footer-nav a:focus-visible {
        outline: 1px solid var(--color-gold);
        outline-offset: 2px;
      }
      .footer-nav-sep {
        color: var(--color-ledger);
        user-select: none;
        padding: 0 0.1rem;
      }
      .footer-note {
        margin: 1.1rem 0 0;
        font-family: "skolar-latin", serif;
        font-size: clamp(0.625rem, 1.6vw, 0.6875rem);
        font-weight: 300;
        line-height: 1.6;
        color: var(--color-ocean);
        opacity: 0.92;
        letter-spacing: 0.025em;
        max-width: 24rem;
      }
      .footer-affil-block {
        margin-top: clamp(1.75rem, 4.5vw, 2.5rem);
        padding-top: clamp(1.25rem, 3.5vw, 1.75rem);
        border-top: 1px solid var(--color-ledger);
      }
      .footer-affil-label {
        margin: 0;
        font-family: "neue-haas-grotesk-display", sans-serif;
        font-size: clamp(0.5625rem, 1.4vw, 0.625rem);
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--color-ocean);
        opacity: 0.72;
      }
      .affiliate-marks {
        margin: 1rem 0 0;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: flex-end;
        gap: clamp(1.75rem, 6vw, 3.25rem);
      }
      .affiliate-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.55rem;
        min-width: min(8.5rem, 38vw);
        max-width: 11rem;
        padding: 0.4rem 0.5rem;
        text-decoration: none;
        color: inherit;
        border-radius: 6px;
        transition: opacity 0.2s ease;
      }
      .affiliate-item:hover {
        opacity: 0.92;
      }
      .affiliate-item:focus-visible {
        outline: 1px solid var(--color-gold);
        outline-offset: 3px;
      }
      .affiliate-item img {
        display: block;
        height: clamp(1.35rem, 4.2vw, 1.85rem);
        width: auto;
        max-width: min(8.5rem, 38vw);
        object-fit: contain;
        opacity: 0.58;
        transition: opacity 0.2s ease;
      }
      .affiliate-item:hover img {
        opacity: 0.76;
      }
      .affiliate-name {
        font-family: "skolar-latin", serif;
        font-size: clamp(0.625rem, 1.65vw, 0.6875rem);
        font-weight: 400;
        line-height: 1.35;
        letter-spacing: 0.05em;
        color: var(--color-ocean);
        opacity: 0.88;
        text-align: center;
      }
      @media (min-width: 640px) {
        .footer-inner {
          max-width: 40rem;
        }
        .site-footer {
          padding-top: clamp(2.25rem, 4vw, 3rem);
          padding-bottom: calc(3rem + env(safe-area-inset-bottom, 0px));
        }
      }
      @media (min-width: 900px) {
        .footer-inner {
          max-width: 44rem;
        }
        .site-footer {
          padding-top: 2.75rem;
          padding-left: 2rem;
          padding-right: 2rem;
          padding-bottom: calc(3.25rem + env(safe-area-inset-bottom, 0px));
        }
        .footer-brand-mark img {
          width: 3.875rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main class="hero-wrap">
        <div class="hero">
          <img
            class="logo"
            src="assets/favicons/D_FAV_2.svg"
            alt=""
            width="176"
            height="176"
            decoding="async"
          />
          <h1 class="title">Dempsey Agency</h1>
          <p class="tagline">Coming Soon</p>
        </div>
      </main>
      <footer class="site-footer">
        <div class="footer-inner">
          <div class="footer-brand">
            <a
              class="footer-brand-mark"
              href="https://dempsey.agency/"
              aria-label="Dempsey Agency"
            >
              <img
                src="assets/branding/D-FAV.svg"
                alt=""
                width="62"
                height="62"
                decoding="async"
              />
            </a>
            <p class="footer-brand-name">Dempsey Agency</p>
          </div>

          <div class="footer-legal-block">
            <p class="footer-legal">
              © 2026 Dempsey Agency, LLC. All rights reserved.
            </p>
            <nav class="footer-nav" aria-label="Legal and contact">
              <a href="/privacy">Privacy Policy</a>
              <span class="footer-nav-sep" aria-hidden="true">·</span>
              <a href="/terms">Terms of Use</a>
              <span class="footer-nav-sep" aria-hidden="true">·</span>
              <a href="/contact">Contact</a>
            </nav>
            <p class="footer-note">
              Dempsey Agency, LLC is an independent business entity.
            </p>
          </div>

          <div class="footer-affil-block">
            <p class="footer-affil-label">Affiliated companies</p>
            <div class="affiliate-marks">
              <a
                class="affiliate-item"
                href="https://adsell.ai/"
                target="_blank"
                rel="noopener noreferrer"
              >
                <img
                  src="assets/branding/as-short-wordmark.svg"
                  alt=""
                  width="96"
                  height="28"
                  decoding="async"
                />
                <span class="affiliate-name">AdSell.ai</span>
              </a>
              <a
                class="affiliate-item"
                href="https://www.vdata.com/"
                target="_blank"
                rel="noopener noreferrer"
              >
                <img
                  src="assets/branding/vdata-logo-v.svg"
                  alt=""
                  width="40"
                  height="40"
                  decoding="async"
                />
                <span class="affiliate-name">Vision Data</span>
              </a>
            </div>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
