<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dempsey Agency</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="stylesheet" href="https://use.typekit.net/urn3pan.css" />
    <style>
      :root {
        color-scheme: light;
        --color-midnight: #10233f;
        --color-fir: #0f524a;
        --color-ocean: #4b6b8a;
        --color-ledger: #e2e8f0;
        --color-canvas: #f8fafc;
        --color-gold: #b18a53;
        --bg: var(--color-canvas);
        --text: var(--color-midnight);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
      }
      .page {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      .hero-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(2rem, 8vw, 4rem) clamp(1.5rem, 6vw, 2.5rem);
      }
      .hero {
        width: 100%;
        max-width: 36rem;
        text-align: center;
      }
      .logo {
        display: block;
        width: clamp(14.5rem, 48vw, 19.25rem);
        max-width: min(92vw, 20rem);
        height: auto;
        margin: 0 auto clamp(2rem, 5.5vw, 2.75rem);
        object-fit: contain;
        object-position: center center;
      }
      .tagline {
        margin: 0;
        font-family: "skolar-latin", serif;
        font-weight: 300;
        font-size: clamp(0.8125rem, 2.2vw, 1rem);
        letter-spacing: 0.36em;
        text-transform: uppercase;
        color: var(--color-ocean);
      }
      .site-footer {
        width: 100%;
        box-sizing: border-box;
        border-top: 1px solid var(--color-ledger);
        background: var(--color-canvas);
        padding: clamp(2rem, 4vw, 2.75rem)
          clamp(1.25rem, 4vw, 2.25rem)
          calc(2rem + env(safe-area-inset-bottom, 0px));
        margin-top: auto;
      }
      .footer-shell {
        box-sizing: border-box;
        width: 100%;
        max-width: min(56rem, 100%);
        margin-inline: auto;
      }
      .footer-main {
        display: grid;
        grid-template-columns: 1fr;
        align-items: start;
        gap: clamp(1.75rem, 3.2vw, 2.35rem);
        padding-bottom: clamp(1.65rem, 3vw, 2.1rem);
        border-bottom: 1px solid var(--color-ledger);
      }
      .footer-col {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        text-align: left;
        min-width: 0;
      }
      .footer-col-heading {
        margin: 0 0 clamp(0.7rem, 1.45vw, 0.95rem);
        font-family: "neue-haas-grotesk-display", sans-serif;
        font-size: clamp(0.6875rem, 1.25vw, 0.75rem);
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--color-ocean);
        opacity: 0.78;
      }
      .footer-brand-mark {
        display: inline-flex;
        line-height: 0;
        border-radius: 4px;
        transition: opacity 0.2s ease;
        max-width: 100%;
      }
      .footer-brand-mark:hover {
        opacity: 0.88;
      }
      .footer-brand-mark:focus-visible {
        outline: 2px solid var(--color-gold);
        outline-offset: 4px;
      }
      .footer-brand-mark img {
        display: block;
        width: auto;
        height: clamp(1.95rem, 4.5vw, 2.35rem);
        max-width: min(100%, 22rem);
        object-fit: contain;
        object-position: left center;
      }
      .affiliate-stack {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: clamp(0.85rem, 1.9vw, 1.15rem);
        width: 100%;
      }
      .affiliate-item {
        display: block;
        min-width: 0;
        max-width: 100%;
        padding: 0.3rem 0;
        text-decoration: none;
        color: inherit;
        border-radius: 6px;
        transition: opacity 0.2s ease;
      }
      .affiliate-item:hover {
        opacity: 0.9;
      }
      .affiliate-item:focus-visible {
        outline: 2px solid var(--color-gold);
        outline-offset: 3px;
      }
      .affiliate-logo-box {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        box-sizing: border-box;
        width: 100%;
        max-width: 12rem;
        height: 2.55rem;
      }
      .affiliate-logo-img {
        display: block;
        width: auto;
        height: auto;
        max-width: 100%;
        object-fit: contain;
        object-position: left center;
        opacity: 0.62;
        transition: opacity 0.2s ease;
      }
      .affiliate-item--vdata .affiliate-logo-img {
        max-height: 1.78rem;
        width: auto;
        transform: scale(0.97);
        transform-origin: left center;
      }
      .affiliate-item--adsell .affiliate-logo-img {
        max-height: 1.42rem;
        width: auto;
        transform: translateY(0.05rem);
      }
      .affiliate-item:hover .affiliate-logo-img {
        opacity: 0.78;
      }
      .footer-contact {
        margin: 0;
        padding: 0;
        font-style: normal;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.12rem;
        font-family: "skolar-latin", serif;
        font-size: clamp(0.84375rem, 1.45vw, 0.90625rem);
        font-weight: 400;
        line-height: 1.42;
        letter-spacing: 0.012em;
        color: var(--color-ocean);
        opacity: 0.88;
      }
      .footer-contact a {
        color: inherit;
        text-decoration: none;
        border-radius: 3px;
        padding: 0.1rem 0.15rem;
        margin: -0.1rem -0.15rem;
        transition: color 0.2s ease;
      }
      .footer-contact a:hover {
        color: var(--color-fir);
      }
      .footer-contact a:focus-visible {
        outline: 2px solid var(--color-gold);
        outline-offset: 2px;
      }
      .footer-contact-line {
        margin: 0;
      }
      .footer-sub {
        padding-top: clamp(1.35rem, 2.5vw, 1.75rem);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: clamp(0.65rem, 1.5vw, 0.85rem);
      }
      .footer-sub-nav {
        margin: 0;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        row-gap: 0.45rem;
        column-gap: clamp(0.65rem, 2vw, 1.1rem);
        font-family: "skolar-latin", serif;
        font-size: clamp(0.78125rem, 1.35vw, 0.875rem);
        font-weight: 400;
      }
      .footer-sub-nav a {
        color: var(--color-midnight);
        text-decoration: none;
        letter-spacing: 0.015em;
        padding: 0.4rem 0.55rem;
        border-radius: 4px;
        transition: color 0.2s ease;
      }
      .footer-sub-nav a:hover {
        color: var(--color-fir);
      }
      .footer-sub-nav a:focus-visible {
        outline: 2px solid var(--color-gold);
        outline-offset: 2px;
      }
      .footer-sub-meta {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.22rem;
        max-width: 40rem;
      }
      .footer-legal {
        margin: 0;
        font-family: "skolar-latin", serif;
        font-size: clamp(0.6875rem, 1.15vw, 0.75rem);
        font-weight: 400;
        line-height: 1.5;
        color: var(--color-ocean);
        opacity: 0.68;
        letter-spacing: 0.01em;
        text-wrap: balance;
      }
      .footer-note {
        margin: 0;
        font-family: "skolar-latin", serif;
        font-size: clamp(0.625rem, 1.05vw, 0.6875rem);
        font-weight: 300;
        line-height: 1.5;
        color: var(--color-ocean);
        opacity: 0.55;
        letter-spacing: 0.012em;
        text-wrap: balance;
      }
      @media (min-width: 640px) {
        .footer-main {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          column-gap: clamp(1.5rem, 3vw, 2.25rem);
          row-gap: clamp(1.65rem, 2.8vw, 2.1rem);
        }
        .footer-col--contact {
          grid-column: 1 / -1;
        }
        .footer-brand-mark img {
          height: clamp(2.05rem, 3.5vw, 2.4rem);
          max-width: min(100%, 23rem);
        }
        .affiliate-logo-box {
          max-width: 12.5rem;
          height: 2.7rem;
        }
        .affiliate-item--vdata .affiliate-logo-img {
          max-height: 1.85rem;
        }
        .affiliate-item--adsell .affiliate-logo-img {
          max-height: 1.5rem;
        }
      }
      @media (min-width: 900px) {
        .site-footer {
          padding-inline: clamp(1.75rem, 4vw, 2.75rem);
        }
        .footer-shell {
          max-width: min(56.25rem, 100%);
        }
        .footer-main {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          column-gap: clamp(1.75rem, 3vw, 2.5rem);
          row-gap: 0;
        }
        .footer-col--contact {
          grid-column: auto;
        }
        .footer-brand-mark img {
          height: clamp(2.1rem, 2.5vw, 2.45rem);
          max-width: min(100%, 24rem);
        }
        .affiliate-logo-box {
          max-width: 12.75rem;
          height: 2.78rem;
        }
        .affiliate-item--vdata .affiliate-logo-img {
          max-height: 1.9rem;
        }
        .affiliate-item--adsell .affiliate-logo-img {
          max-height: 1.54rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main class="hero-wrap">
        <div class="hero">
          <img
            class="logo"
            src="assets/branding/hor-lockup.svg"
            alt="Dempsey Agency logo"
            width="244"
            height="67"
            decoding="async"
          />
          <p class="tagline">Coming Soon</p>
        </div>
      </main>
      <footer class="site-footer">
        <div class="footer-shell">
          <div class="footer-main">
            <div class="footer-col footer-col--brand">
              <a class="footer-brand-mark" href="https://dempsey.agency">
                <img
                  src="assets/branding/hor-lockup.svg"
                  alt="Dempsey Agency"
                  width="244"
                  height="67"
                  decoding="async"
                />
              </a>
            </div>

            <div class="footer-col footer-col--affiliates">
              <h2 class="footer-col-heading">Affiliated companies</h2>
              <div class="affiliate-stack">
                <a
                  class="affiliate-item affiliate-item--vdata"
                  href="https://www.vdata.com/"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <span class="affiliate-logo-box">
                    <img
                      class="affiliate-logo-img"
                      src="assets/branding/V-Data-wordimage.svg"
                      alt="Vision Data"
                      width="2675"
                      height="454"
                      decoding="async"
                    />
                  </span>
                </a>
                <a
                  class="affiliate-item affiliate-item--adsell"
                  href="https://adsell.ai/"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <span class="affiliate-logo-box">
                    <img
                      class="affiliate-logo-img"
                      src="assets/branding/blue-as-full-wordmark%20copy.svg"
                      alt="AdSell.ai"
                      width="200"
                      height="42"
                      decoding="async"
                    />
                  </span>
                </a>
              </div>
            </div>

            <div class="footer-col footer-col--contact">
              <h2 class="footer-col-heading">Contact</h2>
              <address class="footer-contact">
                <a class="footer-contact-line" href="mailto:info@dempsey.agency"
                  >info@dempsey.agency</a
                >
                <p class="footer-contact-line">1377 Third Street</p>
                <p class="footer-contact-line">Rensselaer, NY 12144</p>
              </address>
            </div>
          </div>

          <div class="footer-sub">
            <nav class="footer-sub-nav" aria-label="Legal and contact">
              <a href="/privacy">Privacy Policy</a>
              <a href="/terms">Terms of Use</a>
              <a href="/contact">Contact</a>
            </nav>
            <div class="footer-sub-meta">
              <p class="footer-legal">
                © 2026 Dempsey Agency, LLC. All rights reserved.
              </p>
              <p class="footer-note">
                Dempsey Agency, LLC is an independent business entity.
              </p>
            </div>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
